<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ikonweb.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bukittinggi Heritage — perjalanan sejarah di jantung Minangkabau, dari Jam Gadang hingga warisan budaya dataran tinggi."
    />

    <!-- ── Preload critical above-the-fold images (WebP) ── -->
    <!-- These are downloaded immediately so the browser already has them when JS renders -->
    <link rel="preload" href="/src/assets/bg4.webp" as="image" type="image/webp" />
    <link rel="preload" href="/src/assets/menara.webp" as="image" type="image/webp" />
    <link rel="preload" href="/src/assets/a.webp" as="image" type="image/webp" />
    <link rel="preload" href="/src/assets/b.webp" as="image" type="image/webp" />
    <link rel="preload" href="/src/assets/c.webp" as="image" type="image/webp" />

    <!-- ── DNS prefetch for external resources ── -->
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://ajax.googleapis.com" />

    <title>Bukittinggi Heritage</title>

    <!-- 3D model-viewer script — loaded async so it doesn't block rendering -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
